<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#000000" />
  <title>Nossa História</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%231ed760'><path d='M12 20.6s-7.4-4.7-9.7-8.8C.9 8.4 2.6 4.8 6.3 4.8c2.1 0 3.4 1.3 4 2.4.6-1.1 1.9-2.4 4-2.4 3.7 0 5.4 3.6 4 7C19.4 15.9 12 20.6 12 20.6z'/></svg>" />
</head>
<body>
  <div class="app" id="app">

    <!-- ===== Sidebar ===== -->
    <aside class="sidebar">
      <nav class="sidebar__top">
        <div class="sidebar__logo" id="logo">
          <span class="sidebar__logo-heart" data-icon="heartBrand" data-icon-size="26"></span>
          <span class="sidebar__logo-text" id="logoText">Nossa História</span>
        </div>
        <a href="#/home" data-route="home" class="snav"><span class="snav__ic" data-icon="home"></span> Início</a>
        <a href="#/search" data-route="search" class="snav"><span class="snav__ic" data-icon="search"></span> Buscar</a>
        <a href="#/music" data-route="music" class="snav"><span class="snav__ic" data-icon="music"></span> Trilha Sonora</a>
      </nav>

      <div class="sidebar__lib">
        <div class="sidebar__lib-head">
          <a href="#/library" class="sidebar__lib-title"><span data-icon="library" data-icon-size="22"></span> Sua Biblioteca</a>
        </div>
        <div class="sidebar__chips" id="libChips"></div>
        <div class="sidebar__list" id="libraryList"></div>
        <div class="sidebar__counter" id="sidebarCounter"></div>
      </div>
    </aside>

    <!-- ===== Main ===== -->
    <main class="main" id="main">
      <div class="main__gradient" id="mainGradient"></div>
      <header class="topbar" id="topbar">
        <div class="topbar__nav">
          <button class="topbar__btn" id="btnBack" data-icon="chevronLeft" data-icon-size="22" title="Voltar"></button>
          <button class="topbar__btn" id="btnFwd" data-icon="chevronRight" data-icon-size="22" title="Avançar"></button>
        </div>
        <div class="topbar__title" id="topbarTitle"></div>
        <div class="topbar__right">
          <button class="topbar__premium" id="btnRecommend"><span data-icon="sparkles" data-icon-size="18"></span> Recomendado</button>
          <button class="topbar__avatar" id="btnSfx" data-icon="bell" data-icon-size="18" title="Efeitos sonoros"></button>
          <button class="topbar__avatar" id="avatar" data-icon="heartFill" data-icon-size="18" title="Início"></button>
        </div>
      </header>
      <div class="view" id="view"></div>
    </main>

    <!-- ===== Now Playing ===== -->
    <aside class="nowpanel" id="nowPanel">
      <div class="nowpanel__head">
        <span id="nowPanelMonth">Tocando agora</span>
        <button class="nowpanel__close" id="nowPanelClose" data-icon="x" data-icon-size="20" title="Fechar"></button>
      </div>
      <div class="nowpanel__body" id="nowPanelBody"></div>
    </aside>

    <!-- ===== Player de música ===== -->
    <footer class="player" id="player">
      <audio id="audioEl" preload="metadata"></audio>
      <div class="player__left">
        <div class="player__cover" id="playerCover"></div>
        <div class="player__meta" id="playerMeta">
          <div class="player__title" id="playerTitle">—</div>
          <div class="player__sub" id="playerSub">escolha uma música</div>
        </div>
        <button class="player__like" id="playerLike" data-icon="heart" data-icon-size="18" title="Curtir"></button>
      </div>
      <div class="player__center">
        <div class="player__controls">
          <button class="pbtn pbtn--sm" id="btnShuffle" data-icon="shuffle" data-icon-size="18" title="Aleatório"></button>
          <button class="pbtn" id="btnPrev" data-icon="prev" data-icon-size="20" title="Anterior"></button>
          <button class="pbtn pbtn--play" id="btnPlay" data-icon="play" data-icon-size="18" title="Tocar"></button>
          <button class="pbtn" id="btnNext" data-icon="next" data-icon-size="20" title="Próxima"></button>
          <button class="pbtn pbtn--sm" id="btnRepeat" data-icon="repeat" data-icon-size="18" title="Repetir"></button>
        </div>
        <div class="player__barwrap">
          <span class="player__time" id="playerPos">0:00</span>
          <div class="player__bar" id="playerBar"><div class="player__progress" id="playerProgress"><span class="player__knob"></span></div></div>
          <span class="player__time" id="playerTotal">0:00</span>
        </div>
      </div>
      <div class="player__right">
        <button class="pbtn pbtn--sm" id="btnNowPanel" data-icon="pip" data-icon-size="18" title="Tocando agora"></button>
        <button class="pbtn pbtn--sm" id="btnTimeMachine" data-icon="history" data-icon-size="18" title="Máquina do Tempo"></button>
        <button class="pbtn pbtn--sm" id="btnVolume" data-icon="volume" data-icon-size="18" title="Volume"></button>
        <input type="range" id="volume" class="player__vol" min="0" max="100" value="80" aria-label="Volume" />
        <button class="player__miniplay" id="btnMiniPlay" data-icon="play" data-icon-size="22" title="Tocar"></button>
      </div>
    </footer>

    <!-- ===== Bottom nav (mobile) ===== -->
    <nav class="bottomnav" id="bottomNav">
      <a href="#/home" data-route="home" class="bnav"><span data-icon="home" data-icon-size="22"></span>Início</a>
      <a href="#/search" data-route="search" class="bnav"><span data-icon="search" data-icon-size="22"></span>Buscar</a>
      <a href="#/music" data-route="music" class="bnav"><span data-icon="music" data-icon-size="22"></span>Música</a>
      <a href="#/memories" data-route="memories" class="bnav"><span data-icon="image" data-icon-size="22"></span>Memórias</a>
      <a href="#/library" data-route="library" class="bnav"><span data-icon="library" data-icon-size="22"></span>Biblioteca</a>
    </nav>
  </div>

  <!-- ===== Modal ===== -->
  <div class="modal" id="modal" hidden>
    <div class="modal__backdrop" id="modalBackdrop"></div>
    <div class="modal__box" id="modalBox">
      <button class="modal__close" id="modalClose" data-icon="x" data-icon-size="20"></button>
      <div class="modal__content" id="modalContent"></div>
    </div>
  </div>

  <!-- ===== Toast ===== -->
  <div class="toast" id="toast" hidden></div>

  <!-- ===== Final cinematográfico ===== -->
  <div class="finale" id="finale" hidden>
    <div class="finale__line" id="finaleLine"></div>
    <button class="finale__skip" id="finaleSkip">pular</button>
  </div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
